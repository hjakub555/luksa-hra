name: Build APK

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repozitáře
        uses: actions/checkout@v4

      - name: Nastavení Pythonu
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalace systémových závislostí
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-pip zip unzip \
            openjdk-17-jdk \
            libffi-dev libssl-dev \
            build-essential git \
            libltdl-dev libsqlite3-dev \
            ccache autoconf automake libtool

      - name: Instalace Buildozeru a Cythonu
        run: |
          pip install --upgrade pip
          pip install "buildozer>=1.5.0" "cython<3.0.0"

      - name: Sestavení APK
        run: buildozer android debug

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Luksa-Rap-APK
          path: bin/*.apk
